<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>An Important Question 🤔</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream: #fff8f0;
      --rose: #ff6b6b;
      --peach: #ffb347;
      --deep: #2d1b4e;
      --gold: #f7c948;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff1f8 0%, #fff8f0 60%, #f0f8ff 100%);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      overflow: hidden;
    }

    /* floating sparkles */
    .sparkles-bg {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .sparkle {
      position: absolute;
      animation: sparkleFloat linear infinite;
      font-size: 1.2rem;
      opacity: 0;
    }

    @keyframes sparkleFloat {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      15%  { opacity: 0.7; }
      85%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(540deg); opacity: 0; }
    }

    /* ===== MAIN CARD ===== */
    .card {
      position: relative;
      z-index: 1;
      background: white;
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 80px rgba(255,107,107,0.15), 0 4px 20px rgba(0,0,0,0.05);
      text-align: center;
    }

    .warning-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--rose), var(--peach));
      color: white;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .cartoon-wrap {
      margin: 0 auto 24px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff1f8, #fff8f0);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px dashed #ffd6e0;
      overflow: hidden;
      position: relative;
    }

    .cartoon-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    .cartoon-fallback {
      font-size: 5rem;
      animation: wiggle 1.5s ease infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    .question-heading {
      font-family: 'Dancing Script', cursive;
      font-size: 1.3rem;
      color: var(--peach);
      margin-bottom: 12px;
    }

    .question-main {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: var(--deep);
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .question-main span { color: var(--rose); font-style: italic; }

    .question-sub {
      color: #9a8a9a;
      font-size: 0.9rem;
      margin-bottom: 40px;
    }

    /* ===== BUTTONS ===== */
    .btn-row {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-yes {
      padding: 18px 52px;
      background: linear-gradient(135deg, #ff6b6b, #ffb347);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 36px rgba(255,107,107,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-yes:hover {
      transform: scale(1.06) translateY(-3px);
      box-shadow: 0 18px 48px rgba(255,107,107,0.5);
    }

    .btn-no {
      padding: 16px 40px;
      background: transparent;
      color: #ccc;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: 2px solid #eee;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    /* ===== PLEADING POPUP ===== */
    .plead-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45, 27, 78, 0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .plead-overlay.active {
      display: flex;
    }

    .plead-box {
      background: white;
      border-radius: 28px;
      padding: 44px 36px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .plead-emoji {
      font-size: 4rem;
      display: block;
      margin-bottom: 16px;
      animation: shake 0.5s ease infinite;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(-8deg); }
      50% { transform: rotate(8deg); }
    }

    .plead-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--deep);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .plead-sub {
      font-size: 0.9rem;
      color: #bbb;
      margin-bottom: 28px;
    }

    .plead-yes-btn {
      padding: 16px 48px;
      background: linear-gradient(135deg, #ff6b6b, #ffb347);
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(255,107,107,0.4);
      transition: transform 0.2s;
    }

    .plead-yes-btn:hover { transform: scale(1.05); }

    /* funny counter */
    .no-counter {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #ddd;
    }

    .footer-link {
      margin-top: 32px;
      display: block;
      color: #ddd;
      font-size: 0.8rem;
      text-decoration: none;
    }

    .footer-link:hover { color: #aaa; }
  </style>
</head>
<body>

<div class="sparkles-bg" id="sparklesBg"></div>

<div class="card">
  <div class="warning-badge">⚠️ Very Important Question Alert ⚠️</div>

  <!-- Cartoon image — replace cartoon.png with your cute cartoon -->
  <div class="cartoon-wrap">
    <img src="assets/cartoon.png" alt="cute cartoon"
         onerror="this.style.display='none'; document.getElementById('fallbackEmoji').style.display='block'"/>
    <span class="cartoon-fallback" id="fallbackEmoji" style="display:none">🐣</span>
  </div>

  <p class="question-heading">Okay so... I have something to ask 👀</p>
  <h1 class="question-main">Will you accept<br/><span>my love?</span></h1>
  <p class="question-sub">Think carefully. (Or don't. Just click Yes.)</p>

  <div class="btn-row">
    <button class="btn-yes" onclick="goToYes()">✅ YES</button>
    <button class="btn-no" id="noBtn" onclick="noClicked()">No</button>
  </div>

  <a href="index.html" class="footer-link">← go back (coward)</a>
</div>

<!-- PLEADING OVERLAY -->
<div class="plead-overlay" id="pleadOverlay">
  <div class="plead-box">
    <span class="plead-emoji">🥺</span>
    <p class="plead-text" id="pleadText">Pleezzzz Dheyyam,<br/>Yes Click Chey,<br/>Pleezz Pleezz Pleezz 🙏</p>
    <p class="plead-sub" id="noCounterText">...you really clicked No?? 😭</p>
    <button class="plead-yes-btn" onclick="goToYes()">Okay Okay YES 💛</button>
    <p class="no-counter" id="noCounter"></p>
  </div>
</div>

<script>
  // sparkles
  const bg = document.getElementById('sparklesBg');
  const sparks = ['✨','💛','🌸','💕','🌟','🌺','💫'];
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('span');
    s.classList.add('sparkle');
    s.textContent = sparks[Math.floor(Math.random() * sparks.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (Math.random() * 12 + 10) + 's';
    s.style.animationDelay = (Math.random() * 8) + 's';
    s.style.fontSize = (Math.random() * 1 + 0.7) + 'rem';
    bg.appendChild(s);
  }

  let noCount = 0;
  const pleas = [
    "Pleezzzz Dheyyam,\nYes Click Chey,\nPleezz Pleezz Pleezz 🙏",
    "Enti idi?? 😭\nNo antunnava??\nPleezzzz Dheyyam 🥺",
    "DHEYYAM 😤\nSee how much I tried!\nJust click YES bro 🙏🙏",
    "Okay I'm begging now. 😭\nOn my knees (metaphorically)\nPLEEZZZ 🫶",
    "Meeru cruel ga unnaru. 😂\nPlease click YES already!!"
  ];

  const subs = [
    "...you really clicked No?? 😭",
    "Still No?? Really?? 😤",
    "bro. BRO. 😭",
    "I made a whole website for you 😭",
    "okay I give up... just kidding click yes 😂"
  ];

  function noClicked() {
    noCount++;
    const idx = Math.min(noCount - 1, pleas.length - 1);
    document.getElementById('pleadText').innerText = pleas[idx];
    document.getElementById('noCounterText').innerText = subs[idx];
    document.getElementById('noCounter').innerText = noCount > 1 ? `You've clicked No ${noCount} times. For shame. 😭` : '';
    document.getElementById('pleadOverlay').classList.add('active');

    // make No button run away after 2 clicks
    if (noCount >= 2) {
      const btn = document.getElementById('noBtn');
      btn.style.position = 'absolute';
      btn.style.transition = 'none';
      document.addEventListener('mousemove', runAway);
    }
  }

  function runAway(e) {
    const btn = document.getElementById('noBtn');
    if (!btn) return;
    const rect = btn.getBoundingClientRect();
    const dx = e.clientX - (rect.left + rect.width/2);
    const dy = e.clientY - (rect.top + rect.height/2);
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 150) {
      const angle = Math.atan2(dy, dx);
      const newX = Math.max(0, Math.min(window.innerWidth - 100, rect.left - Math.cos(angle) * 100));
      const newY = Math.max(0, Math.min(window.innerHeight - 50, rect.top - Math.sin(angle) * 100));
      btn.style.left = newX + 'px';
      btn.style.top = newY + 'px';
    }
  }

  function goToYes() {
    window.location.href = 'video.html';
  }
</script>
</body>
</html>
